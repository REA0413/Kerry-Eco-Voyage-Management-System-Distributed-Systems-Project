syntax = "proto3";

// Java Configuration Options
option java_multiple_files = true;
option java_package = "generated.grpc.CA.touroperations";
option java_outer_classname = "TourOperationsProto";

// =================================================================
// Service 2: Tour Operations & Efficiency Tracker
// =================================================================
service TourOperationsTracker {
  // Functionality 1: Client-side Streaming
  rpc RecordVoyageTelemetry (stream TelemetryData) returns (VoyageSummary) {}
  
  // Functionality 2: Simple RPC
  rpc GetStaffPerformance (StaffRequest) returns (PerformanceScore) {}
}

// Requests and Responses for Service 2
message TelemetryData {
  double latitude = 1; 
  double longitude = 2; 
  float current_fuel_flow = 3; 
}

message VoyageSummary {
  float total_distance = 1; 
  float average_efficiency = 2; 
}

message StaffRequest {
  int32 staff_id = 1; 
}

message PerformanceScore {
  float efficiency_rating = 1; 
}